<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="BODS stream">
  <!-- Background: ownership blue, rounded square -->
  <rect width="64" height="64" rx="14" fill="#0e3a6b"/>
  <!-- Ownership edge: beneficial owner -> company (BOVS-style arrow) -->
  <line x1="32" y1="27" x2="32" y2="41" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="32,45 26.5,37 37.5,37" fill="#ffffff"/>
  <!-- Subject company (entity = rounded square) -->
  <rect x="21.5" y="46" width="21" height="14" rx="3" fill="#ffffff"/>
  <!-- Beneficial owner (person = circle), green = live / a new filing arriving -->
  <circle cx="32" cy="16" r="11" fill="#22c55e"/>
</svg>
